# Render.com blueprint - deploy MLE Replay Parser web service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mle-replay-parser
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_DATABASE_URL
        sync: false  # Add in Render dashboard
      - key: PYTHONPATH
        value: .
